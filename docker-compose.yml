services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: miao-gpt
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      # 必填：管理员密码（不可留空）
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?请在 .env 文件中设置 ADMIN_PASSWORD}
      # 推荐：自定义管理后台路径，不设置则每次重启随机生成
      - ADMIN_PATH=${ADMIN_PATH:-}
      # 可选：跨域来源（留空则只允许同源）
      # - ALLOWED_ORIGIN=https://yourdomain.com
      # 可选：代理白名单（默认 chatgpt.com,chat.openai.com）
      # - PROXY_ALLOWED_HOSTS=chatgpt.com,chat.openai.com
    volumes:
      # 持久化卡密数据、兑换记录、API 设置
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
